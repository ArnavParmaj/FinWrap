<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | FinWrap</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#080a0f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .aurora-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: #080a0f;
        }
        .aurora-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
            filter: blur(80px);
        }
        .aurora-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.1) 0%, rgba(20, 184, 166, 0) 70%);
            filter: blur(80px);
        }
        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            outline: none;
        }
        .primary-glow {
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen flex items-center justify-center p-6 antialiased">
<div class="aurora-glow">
<div class="aurora-1"></div>
<div class="aurora-2"></div>
</div>
<div class="w-full max-w-[480px] space-y-8">
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-3 mb-6">
<div class="bg-primary p-2 rounded-lg primary-glow">
<svg class="w-6 h-6 text-white" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

</svg>
</div>
<span class="text-2xl font-bold tracking-tight text-white">FinWrap</span>
</div>
<h1 class="text-3xl font-black text-white text-center mb-2 tracking-tight">Create your account</h1>
<p class="text-slate-400 text-center font-normal">Join the future of personal finance.</p>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-300 ml-1">Full Name</label>
<input class="w-full h-12 px-4 rounded-lg glass-input text-white placeholder:text-slate-500" placeholder="Enter your full name" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-300 ml-1">Email address</label>
<input class="w-full h-12 px-4 rounded-lg glass-input text-white placeholder:text-slate-500" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg glass-input text-white placeholder:text-slate-500 pr-12" placeholder="Create a strong password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg primary-glow transition-all active:scale-[0.98] mt-4" type="submit">
                    Create account
                </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-transparent px-2 text-slate-500 font-medium">Or continue with</span>
</div>
</div>
<button class="w-full h-12 glass-input rounded-lg flex items-center justify-center gap-3 text-white font-semibold hover:bg-white/10 transition-all active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
</form>
<div class="mt-10 text-center">
<p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign in</a>
</p>
</div>
</div>
<!-- Footer Stats / Trust Elements (Subtle) -->
<div class="flex justify-between items-center px-4 opacity-40 grayscale group-hover:grayscale-0 transition-all">
<div class="text-center">
<p class="text-xs font-black text-white">10M+</p>
<p class="text-[10px] uppercase tracking-widest text-slate-500">Users</p>
</div>
<div class="text-center">
<p class="text-xs font-black text-white">$4.5B</p>
<p class="text-[10px] uppercase tracking-widest text-slate-500">Tracked</p>
</div>
<div class="text-center">
<p class="text-xs font-black text-white">AES-256</p>
<p class="text-[10px] uppercase tracking-widest text-slate-500">Secure</p>
</div>
</div>
</div>
</body></html>
