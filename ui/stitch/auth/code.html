<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#080a0f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .aurora-bg {
            background: radial-gradient(circle at 20% 30%, rgba(100, 103, 242, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(100, 103, 242, 0.1) 0%, transparent 40%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(100, 103, 242, 0.5);
            box-shadow: 0 0 15px rgba(100, 103, 242, 0.2);
            outline: none;
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex items-center justify-center aurora-bg overflow-hidden p-4">
<!-- Auth Container -->
<div class="w-full max-w-[420px] glass-card rounded-2xl p-8 flex flex-col items-center shadow-2xl">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center">
<div class="size-12 bg-primary/20 rounded-xl flex items-center justify-center mb-4 border border-primary/30">
<span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-white mb-1">FinWrap</h1>
<p class="text-slate-400 text-sm font-light">Secure your financial future</p>
</div>
<!-- Social Login -->
<button class="glass-button w-full h-12 rounded-lg flex items-center justify-center gap-3 text-sm font-medium mb-6 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M24 12.27c0-.85-.07-1.74-.22-2.6H12.25v4.92h6.58c-.28 1.48-1.11 2.74-2.35 3.58v2.97h3.81C22.5 19.14 24 16 24 12.27z" fill="#EA4335"></path>
<path d="M12.25 24c3.24 0 5.96-1.07 7.94-2.91l-3.81-2.97c-1.06.72-2.42 1.15-4.13 1.15-3.18 0-5.86-2.15-6.82-5.04H1.54v3.12A11.98 11.98 0 0012.25 24z" fill="#FBBC05"></path>
<path d="M5.43 14.23c-.24-.72-.38-1.49-.38-2.23s.14-1.51.38-2.23V6.65H1.54a11.98 11.98 0 000 10.7l3.89-3.12z" fill="#34A853"></path>
<path d="M12.25 4.77c1.76 0 3.34.61 4.59 1.8l3.44-3.44C18.21 1.17 15.49 0 12.25 0 7.45 0 3.28 2.74 1.54 6.65l3.89 3.12c.96-2.89 3.64-5 6.82-5z" fill="#4285F4"></path>
</svg>
<span class="text-slate-200">Continue with Google</span>
</button>
<div class="w-full flex items-center gap-4 mb-6">
<div class="h-px flex-1 bg-white/10"></div>
<span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">OR EMAIL</span>
<div class="h-px flex-1 bg-white/10"></div>
</div>
<!-- Form Section -->
<form class="w-full space-y-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-400 ml-1">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
<input class="glass-input w-full h-11 rounded-lg pl-11 pr-4 text-sm text-white placeholder:text-slate-600" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold text-slate-400">Password</label>
<a class="text-[10px] font-bold text-primary hover:text-primary/80 transition-colors uppercase tracking-tight" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
<input class="glass-input w-full h-11 rounded-lg pl-11 pr-4 text-sm text-white placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-11 rounded-lg shadow-lg shadow-primary/20 transition-all mt-6 active:scale-[0.98]" type="submit">
                Sign In
            </button>
</form>
<!-- Toggle Section -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-400">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4" href="#">Create account</a>
</p>
</div>
<!-- Footer Info -->
<div class="mt-10 pt-6 border-t border-white/5 w-full flex justify-center gap-6">
<a class="text-[11px] text-slate-600 hover:text-slate-400" href="#">Terms</a>
<a class="text-[11px] text-slate-600 hover:text-slate-400" href="#">Privacy</a>
<a class="text-[11px] text-slate-600 hover:text-slate-400" href="#">Help</a>
</div>
</div>
<!-- Background Elements -->
<div class="fixed -z-10 top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-indigo-500/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
